<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form Version 1</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Outfit', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #141e30, #243b55);
}

/* Container */
.container {
  width: 500px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  color: white;
}

/* Heading */
h2 {
  text-align: center;
}

.subtitle {
  text-align: center;
  margin-bottom: 20px;
  color: #aaa;
}

/* Grid */
.form-grid {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

/* Input Box */
.input-box {
  position: relative;
}

/* Inputs & Select */
.input-box input,
.input-box select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.9);
  font-size: 14px;
}

/* Remove default arrow style (optional) */
.input-box select {
  appearance: none;
}

/* Floating Label */
.input-box label {
  position: absolute;
  left: 12px;
  top: 12px;
  color: gray;
  transition: 0.3s;
  pointer-events: none;
  background: transparent;
}

.input-box input:focus + label,
.input-box input:valid + label,
.input-box select:focus + label,
.input-box select:valid + label {
  top: -8px;
  font-size: 12px;
  color: #00c6ff;
}

/* Textarea */
textarea {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  resize: none;
}

/* Checkbox */
.checkbox {
  margin: 15px 0;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

/* Button */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  font-size: 16px;
}

.btn:hover {
  transform: translateY(-3px);
}
</style>

</head>

<body>

<div class="container">

    <h2>Create Account</h2>
    <p class="subtitle">Start your journey ✨</p>

    <form action="#" method="POST">

        <div class="form-grid">

            <div class="input-box">
                <input type="text" name="firstName" required>
                <label>First Name</label>
            </div>

            <div class="input-box">
                <input type="text" name="lastName" required>
                <label>Last Name</label>
            </div>

            <div class="input-box">
                <input type="email" name="email" required>
                <label>Email</label>
            </div>

            <div class="input-box">
                <input type="tel" name="phone" required>
                <label>Phone</label>
            </div>

            <div class="input-box">
                <input type="password" name="password" required>
                <label>Password</label>
            </div>

            <div class="input-box">
                <input type="password" name="confirmPassword" required>
                <label>Confirm Password</label>
            </div>

            <div class="input-box">
                <select name="country" required>
                    <option value="" disabled selected>Select Country</option>
                    <option>India</option>
                    <option>USA</option>
                    <option>UK</option>
                </select>
                <label>Country</label>
            </div>

            <div class="input-box">
                <select name="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                </select>
                <label>Gender</label>
            </div>

        </div>

        <textarea name="address" placeholder="Address" required></textarea>

        <label class="checkbox">
            <input type="checkbox" name="terms" required>
            I agree to Terms
        </label>

        <button type="submit" class="btn">Register</button>

    </form>

</div>

</body>
</html>
